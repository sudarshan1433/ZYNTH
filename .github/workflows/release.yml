name: Compile and Host CLI

on:
  push:
    tags:
      - 'v*' # Jab bhi tag v0.1.0 push karoge, hosting active ho jayegi

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Release Binary with Secrets Injection
        # Yahan hum GitHub Secrets ko compile karte waqt environment variable banakar pass kar rahe hain
        env:
          HF_ACCESS_TOKEN: ${{ secrets.HF_ACCESS_TOKEN }}
          HF_SPACE_URL: ${{ secrets.HF_SPACE_URL }}
        run: cargo build --release

      - name: Upload Binary to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: target/release/ghost_optimizer
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

